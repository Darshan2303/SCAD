<style>
  body {
    font-family: 'Inter', sans-serif;
    background-color: #fcfdfe; /* Very light blue-grey for a soft base */
  }

  .auth-view-bg {
    --gradient-color-1: #cce3f9; /* Soft Sky Blue */
    --gradient-color-2: #ffe0e0; /* Pale Rose */
    --gradient-color-3: #fffacd; /* Light Pastel Yellow */
    --gradient-color-4: #e8e0ff; /* Soft Lavender */
    background: linear-gradient(-45deg, var(--gradient-color-1), var(--gradient-color-2), var(--gradient-color-3), var(--gradient-color-4));
    background-size: 400% 400%;
    animation: gradientBG 25s ease infinite;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  /* Animation classes */
  .animate-fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.5s ease-out forwards;
  }
  .animate-scale-in {
    animation: scaleIn 0.3s ease-out forwards;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes scaleIn {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
  }

  /* Spotlight Nav Effect */
  .spotlight-nav {
    position: relative;
    overflow: hidden;
  }

  .spotlight-nav::before {
    content: "";
    position: absolute;
    left: var(--mouse-x, -9999px);
    top: var(--mouse-y, -9999px);
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(125, 211, 252, 0.2) 0%, transparent 50%); /* Softer sky-300 */
    width: 300px;
    height: 300px;
    opacity: 0;
    transition: opacity 0.2s ease-out;
    pointer-events: none;
    z-index: 1;
  }

  .spotlight-nav:hover::before {
    opacity: 1;
  }

</style>
